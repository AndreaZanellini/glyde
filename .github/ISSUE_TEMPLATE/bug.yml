name: "Bug report"
description: Something is broken (not a file-opening problem)
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Zoom into ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Log file
      render: shell
  - type: input
    id: environment
    attributes:
      label: OS and Glyde version
    validations:
      required: true
