name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Format & Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # Lint the headless crates on Linux. glyde-app (the egui/winit GUI) is not
      # built here: winit refuses to compile on a headless Linux runner, and the
      # logic that matters lives in glyde-core. The GUI is compiled on macOS and
      # Windows by the `gui` job below and by the release workflow.
      - run: cargo clippy -p glyde-core -p glyde-devtools --all-targets -- -D warnings

  architecture:
    name: Architecture guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # glyde-core must never depend on any GUI crate. See docs/ARCHITECTURE.md.
      - name: Assert glyde-core has no GUI dependencies
        run: |
          if cargo tree -p glyde-core --prefix none --no-dedupe \
             | grep -E '^(egui|eframe|wgpu|winit)( |$)'; then
            echo "::error::glyde-core must not depend on GUI crates"
            exit 1
          fi

  test:
    name: Test core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Unit tests, golden DSP tests, torture-corpus tests, property tests.
      # Scoped to the headless crates so the suite runs identically on all three
      # OSes without needing a display server. GUI build/test is the `gui` job.
      - run: cargo test -p glyde-core -p glyde-devtools --all-features

  gui:
    name: GUI build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # glyde-app needs a windowing backend to compile. On Linux that means the
      # X11/Wayland/GTK system libraries (the same set the release job installs).
      # Since #8 gave eframe the x11+wayland backends, glyde-app now builds on
      # Linux too, so this job covers all three shipped OSes.
      - name: Install Linux GUI build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev
      # Lint, TEST and build the GUI shell on every OS we ship. The test step is
      # the fix for #4: glyde-app's own unit tests (e.g. the tracing-init test)
      # run nowhere else — the headless `test` job excludes this crate.
      - run: cargo clippy -p glyde-app --all-targets -- -D warnings
      - run: cargo test -p glyde-app
      - run: cargo build -p glyde-app

  bench:
    name: Performance gates
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Large fixtures are generated, never committed. See docs/QUALITY.md §3.
      - name: Generate large synthetic fixtures
        run: cargo run --release -p glyde-devtools --bin generate_fixtures -- --size-gb 1
      # Budgets from docs/SPEC.md §5. Exceeding one fails the build.
      - name: Criterion benchmarks (build-blocking budgets)
        run: cargo bench -p glyde-core -- --output-format bencher | tee bench.txt
      - name: Peak memory gate
        run: cargo run --release -p glyde-devtools --bin memory_gate

  deny:
    name: Licenses & advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # log-level info makes the advisory ID and crate visible in the log,
          # instead of a bare "advisories FAILED". If an advisory still fails
          # after this, its RUSTSEC id will be printed for a targeted fix.
          log-level: info
          command: check advisories bans licenses sources