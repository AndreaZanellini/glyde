name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GUI build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev
      - run: cargo build --release --target ${{ matrix.target }} -p glyde-app

      # TODO(before going public): macOS signing + notarization (Apple Developer),
      # Windows code signing. An unsigned first-run warning is a release blocker
      # for the public repo. See docs/SPEC.md §7.

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/glyde.exe dist/glyde-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/glyde dist/glyde-${{ matrix.target }}
          fi
      - name: Assert binary size budget (<= 50 MB, docs/SPEC.md §5)
        shell: bash
        run: |
          for f in dist/*; do
            size=$(wc -c < "$f")
            echo "$f: $size bytes"
            [ "$size" -le 52428800 ] || { echo "::error::$f exceeds 50 MB budget"; exit 1; }
          done
      - uses: actions/upload-artifact@v4
        with:
          name: glyde-${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          # Release notes must include, until signing is in place, the exact
          # "unsigned build" workaround steps for macOS and Windows.