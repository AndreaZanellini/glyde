# cargo-deny configuration — enforced by CI (docs/QUALITY.md §4).
#
# Glyde ships as a redistributed binary under Apache-2.0, so every transitive
# dependency's license must be compatible with that. This gate exists so the
# repository can be made public without a licensing audit.

[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]
all-features = true

[advisories]
version = 2
# Security vulnerabilities always fail in v2 (not configurable) and that is what
# we want. Yanked crates only warn: a yanked TRANSITIVE crate from the GUI tree
# should be visible but must not block development. Tighten to "deny" once the
# dependency versions are settled after the first `cargo update`.
yanked = "warn"
# The egui/winit GUI stack pulls in some crates flagged "unmaintained" in the
# RUSTSEC database (common for platform/font shims). Those are not security
# vulnerabilities and must not block development. In this cargo-deny version
# `unmaintained` takes a SCOPE (all/workspace/transitive/none), not warn/deny:
# "workspace" fails only if an unmaintained crate is a DIRECT dependency of our
# own crates, ignoring ones pulled in transitively by the GUI stack. Real
# vulnerabilities still fail regardless of this setting.
unmaintained = "workspace"
# When a real vulnerability appears with no fix yet, record it here WITH a reason,
# so the gate stays meaningful instead of being switched off:
#   ignore = [ { id = "RUSTSEC-YYYY-NNNN", reason = "why this is acceptable for now" } ]
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "quick-xml is a build-time transitive of wayland-scanner (Linux GUI codegen). Glyde never parses network/untrusted XML; this DoS surface is unreachable. Remove when wayland-scanner moves to quick-xml >=0.41." },
    { id = "RUSTSEC-2026-0195", reason = "same: transitive via wayland-scanner, no untrusted-XML path in Glyde. Remove when the upstream tree allows quick-xml >=0.41." },
]

[licenses]
version = 2
# Permissive licenses that are safe to redistribute inside an Apache-2.0 binary.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",
    "MPL-2.0",
    # --- Font licenses, required by egui's bundled default fonts -------------
    # eframe enables `default_fonts`, which pulls in `epaint_default_fonts`.
    # That crate embeds fonts under OFL-1.1 (SIL Open Font License) and the
    # Ubuntu Font Licence. Both are OSI/FSF-recognized and standard for bundled
    # fonts; they apply only to the font data, not to our code.
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.9
# Copyleft (GPL/AGPL/LGPL) is absent by design: it is incompatible with the
# distribution model. If a dependency introduces one, the dependency is wrong.
exceptions = []

[bans]
# The egui/wgpu/winit tree pulls many crates at several versions and a few with
# wildcard version reqs. None of these are OUR choices and none are worth failing
# the build over. Warn so they stay visible without blocking development.
multiple-versions = "warn"
wildcards = "warn"
# One canonical implementation per concept (docs/ARCHITECTURE.md §Hard rules).
# These crates would each become a second way to do something we already do.
deny = [
    # Glyde streams and memory-maps; it never materializes a DataFrame.
    { name = "polars" },
    # FFT belongs to rustfft only; a second FFT crate means a second numeric path.
    { name = "fftw" },
    # Async runtimes: the threading model is explicit (docs/ARCHITECTURE.md).
    { name = "tokio" },
    { name = "async-std" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]